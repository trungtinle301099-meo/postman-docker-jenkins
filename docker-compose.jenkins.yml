services:
  jenkins:
    build:
      context: .
      dockerfile: jenkins/Dockerfile
    container_name: jenkins-postman
    user: root
    ports:
      - "8090:8080"
      - "50000:50000"
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - JAVA_OPTS=-Duser.timezone=Asia/Ho_Chi_Minh
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  jenkins_home:
